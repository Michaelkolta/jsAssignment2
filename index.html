<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What's For Dinner</title>

  <!-- icon site of the title -->
  <link rel="icon" href="./images/logo-2.jpg" />
  <!-- google font  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Days+One&display=swap"
    rel="stylesheet" />

  <!-- boot strap  -->
  <link rel="stylesheet" href="css/bootstrap.min.css" />
  <!-- link fontawsome (icons) -->
  <link rel="stylesheet" href="css/all.min.css" />
  <!-- link index css Main -->
  <link rel="stylesheet" href="css/index.css" />
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
    <div class="container">
      <!-- Left logo -->
      <div class="left-logo d-flex align-items-center">
        <div>
          <span class="logo-cultry"><i class="fa-solid fa-utensils fa-lg text-white"></i></span>
        </div>
        <div class="ms-2">
          <h3><a class="navbar-brand mb-0" href="#">What's For Dinner</a></h3>
          <p class="mb-0 small text-muted">Your daily meal inspiration</p>
        </div>
      </div>

      <!-- Toggler -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Right nav-items -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="fa-solid fa-bookmark fa-lg"></i>
                <span class="d-inline d-lg-none"> Saved Recipes</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="fa-solid fa-clock-rotate-left fa-lg"></i>
                <span class="d-inline d-lg-none"> Recent</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">
                <i class="fa-solid fa-gear fa-lg"></i>
                <span class="d-inline d-lg-none"> Settings</span>
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link d-flex align-items-center" href="#">
                <img src="images/avatar-2.jpg" alt="Profile" class="profile-img rounded-circle me-2 img-thumbnail">
                <span class="d-inline d-lg-none"> Profile</span>
              </a>
            </li>
          </ul>
        </div>
        </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- main -section -->
  <main class="recipe-main">
    <section class="recipe-box container ">
      <div class="row " id="rowData ">
        <!-- Left side (image + rating + prep info) -->
        <div class="col-lg-5 p-0 position-relative ">
          <img src="" class="img-fluid fixed-img" alt="Chicken Tikka Masala"
            id="productImage">
          <div
            class="rating-box position-absolute top-0 start-0 m-3 bg-white rounded-pill px-3 py-1 d-flex align-items-center shadow-sm">
            <i class="fa-solid fa-star text-warning me-2"></i>
            <span id="rate" class="fw-bold"></span>
            <span id="reviews" class="text-muted ms-1"></span>
          </div>
          <div class=" prep-info d-flex justify-content-around bg-white rounded-3 shadow-sm p-3 mt-3 ">
            <div><i class="fa-solid fa-clock text-warning "></i> <span>Prep Time</span><br><span id="prepTime"
                class="fw-bold ">
                </span></div>
            <div><i class="fa-solid fa-fire text-danger"></i> <span>Cook Time</span><br><span id="cookTime"
                class="fw-bold">
                </span></div>
            <div><i class="fa-solid fa-users text-primary"></i> <span>Servings</span><br><span id="serving"
                class="fw-bold">
                </span></div>
          </div>
        </div>

        <!-- Right side (content) -->
        <div class="col-lg-7 p-4 content-area">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <span id="tag1" class="badge1 rounded-pill px-2 py-1"></span>
              <span id="tag2" class="badge2 rounded-pill px-2 py-1"></span>
              <h1 id="title" class="fw-bold mt-2">  </h1>
              <p id="tileInfo" class="text-muted"> </p>
            </div>
            <div class="button-tag d-flex gap-2">
              <button class="btn btn-light border"><i class="fa-solid fa-bookmark"></i></button>
              <button class="btn btn-light border"><i class="fa-solid fa-share-nodes"></i></button>
            </div>
          </div>

          <!-- Alert Extended Preparation -->
          <div id="alertInfo" class="alert alert-danger mt-3  d-none" role="alert">
            <span ><i class="fa-solid fa-triangle-exclamation me-2 "></i>
              Extended Preparation Time — This recipe requires more than 45 minutes to prepare. Plan accordingly!
            </span>

          </div>

          <!-- Tabs -->
          <ul class="nav nav-tabs mt-4" id="recipeTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="ingredients-tab" data-bs-toggle="tab" data-bs-target="#ingredients"
                type="button" role="tab">
                <span><i class="fa-solid fa-list-check me-1"></i> Ingredients</span>
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="instructions-tab" data-bs-toggle="tab" data-bs-target="#instructions"
                type="button" role="tab">
                <span><i class="fa-solid fa-book-open me-1"></i> Instructions</span>
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="nutrition-tab" data-bs-toggle="tab" data-bs-target="#nutrition" type="button"
                role="tab">
                <span><i class="fa-solid fa-chart-pie me-1"></i> Nutrition</span>
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="tips-tab" data-bs-toggle="tab" data-bs-target="#tips" type="button"
                role="tab">
                <span><i class="fa-solid fa-lightbulb me-1"></i> Chef's Tips</span>
              </button>
            </li>
          </ul>

          <!-- Tab Content -->
          <div class="tab-content mt-3">
            <ul class="tab-pane fade show active" id="ingredients" role="tabpanel"> </ul>
            <ul class="tab-pane fade" id="instructions" role="tabpanel"> </ul>
            <ul class="tab-pane fade" id="nutrition" role="tabpanel"></ul>
            <ul class="tab-pane fade" id="tips" role="tabpanel"> </ul>
          </div>

          <!-- Button -->
          <div class=" mt-4">
            <button class="btn btn-gradient px-4 py-2" id="randombtn">
              <i class="fa-solid fa-arrows-rotate me-2"></i> Try Another Recipe
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>



  <script src="js/index.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
